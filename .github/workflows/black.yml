
# GitHub Action that checks Python formatting with a pinned Black release.

name: black
on: [pull_request]
jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: psf/black@stable
        with:
          options: "--check --diff --verbose"
          version: "26.3.1"
          src: "."
